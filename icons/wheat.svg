<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Wheat/Grain Ears - Chargement produits -->
  <g transform="translate(100, 100)">
    <!-- Left ear -->
    <g transform="translate(-25, 0) rotate(-30)">
      <ellipse cx="0" cy="-20" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="-5" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="10" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="25" rx="6" ry="12" fill="#000"/>
      <line x1="0" y1="35" x2="0" y2="50" stroke="#000" stroke-width="2"/>
    </g>
    
    <!-- Center ear -->
    <g transform="translate(0, 0)">
      <ellipse cx="0" cy="-25" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="-10" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="5" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="20" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="35" rx="6" ry="12" fill="#000"/>
      <line x1="0" y1="45" x2="0" y2="55" stroke="#000" stroke-width="2"/>
    </g>
    
    <!-- Right ear -->
    <g transform="translate(25, 0) rotate(30)">
      <ellipse cx="0" cy="-20" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="-5" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="10" rx="6" ry="12" fill="#000"/>
      <ellipse cx="0" cy="25" rx="6" ry="12" fill="#000"/>
      <line x1="0" y1="35" x2="0" y2="50" stroke="#000" stroke-width="2"/>
    </g>
    
    <!-- Base connection -->
    <circle cx="0" cy="55" r="4" fill="#000"/>
  </g>
</svg>
