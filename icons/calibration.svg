<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0fff0"/>
  
  <!-- Calibration/Settings Icon -->
  <g transform="translate(100, 100)">
    <!-- Main gear -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- Gear teeth -->
    <rect x="-8" y="-45" width="16" height="15" fill="#4CAF50" rx="2"/>
    <rect x="30" y="-25" width="15" height="16" fill="#4CAF50" rx="2" transform="rotate(60)"/>
    <rect x="30" y="9" width="15" height="16" fill="#4CAF50" rx="2" transform="rotate(120)"/>
    <rect x="-8" y="30" width="16" height="15" fill="#4CAF50" rx="2"/>
    <rect x="-45" y="9" width="15" height="16" fill="#4CAF50" rx="2" transform="rotate(240)"/>
    <rect x="-45" y="-25" width="15" height="16" fill="#4CAF50" rx="2" transform="rotate(300)"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="18" fill="#4CAF50"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#fff"/>
    
    <!-- Sensor wave lines -->
    <path d="M -25 15 Q -20 5 -15 15" stroke="#2196F3" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 15 -25 Q 5 -20 15 -15" stroke="#2196F3" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
